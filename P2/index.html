<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>VoicePlayer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #080c10;
      --surface:   #0d1117;
      --border:    #1f2d3d;
      --accent:    #00ffe7;
      --accent2:   #ff3e6c;
      --dim:       #3a5068;
      --text:      #c8d8e8;
      --mono:      'Share Tech Mono', monospace;
      --display:   'Orbitron', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 32px;
      gap: 20px;
      /* Subtle grid background */
      background-image:
        linear-gradient(rgba(0,255,231,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,231,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ─── HEADER ─────────────────────────────────────── */
    header {
      width: 100%;
      max-width: 700px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }

    header h1 {
      font-family: var(--display);
      font-size: 1.1rem;
      letter-spacing: 4px;
      color: var(--accent);
      text-shadow: 0 0 12px rgba(0,255,231,0.4);
    }

    #mic-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 2px;
    }

    #mic-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--dim);
      transition: background 0.3s, box-shadow 0.3s;
    }

    #mic-dot.active {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ─── VIDEO ──────────────────────────────────────── */
    #video-wrapper {
      width: 100%;
      max-width: 700px;
      position: relative;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 0 40px rgba(0,255,231,0.05);
    }

    #video-wrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
      z-index: 1;
    }

    video {
      width: 100%;
      display: block;
    }

    /* Overlay flash de feedback */
    #flash {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
    }

    #flash.show { opacity: 1; }
    #flash.show { animation: flashOut 0.7s forwards; }

    @keyframes flashOut {
      0%   { opacity: 1; }
      60%  { opacity: 1; }
      100% { opacity: 0; }
    }

    #flash-icon {
      font-family: var(--display);
      font-size: 3.5rem;
      font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 30px var(--accent);
      letter-spacing: 3px;
    }

    #flash.error #flash-icon { color: var(--accent2); text-shadow: 0 0 30px var(--accent2); }

    /* ─── BARRA DE ESTADO ────────────────────────────── */
    #status-bar {
      width: 100%;
      max-width: 700px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      font-size: 0.6rem;
      color: var(--dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .stat-value {
      font-family: var(--display);
      font-size: 0.95rem;
      color: var(--accent);
    }

    /* ─── LOG DE COMANDOS ────────────────────────────── */
    #log-panel {
      width: 100%;
      max-width: 700px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 14px;
    }

    #log-title {
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--dim);
      margin-bottom: 10px;
    }

    #log-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 80px;
      overflow: hidden;
    }

    #log-list li {
      font-size: 0.78rem;
      display: flex;
      gap: 10px;
      align-items: baseline;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    #log-list li .ts { color: var(--dim); font-size: 0.65rem; }
    #log-list li .cmd { color: var(--accent); }
    #log-list li.error .cmd { color: var(--accent2); }

    /* ─── GUÍA DE COMANDOS ───────────────────────────── */
    #guide {
      width: 100%;
      max-width: 700px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 14px;
    }

    #guide-title {
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--dim);
      margin-bottom: 12px;
    }

    .guide-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .guide-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,255,231,0.03);
      border: 1px solid rgba(0,255,231,0.08);
      border-radius: 3px;
      padding: 8px 10px;
    }

    .guide-key {
      font-family: var(--display);
      font-size: 0.65rem;
      color: var(--accent);
      letter-spacing: 2px;
      min-width: 56px;
    }

    .guide-desc {
      font-size: 0.7rem;
      color: var(--dim);
    }

    .guide-item.tilt { border-color: rgba(255,62,108,0.15); }
    .guide-item.tilt .guide-key { color: var(--accent2); }

    /* ─── BOTÓN MICRÓFONO ────────────────────────────── */
    #btn-mic {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-size: 1.6rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 0 0 0 rgba(0,255,231,0);
    }

    #btn-mic:hover   { background: rgba(0,255,231,0.08); }
    #btn-mic.active  {
      background: rgba(0,255,231,0.12);
      box-shadow: 0 0 20px rgba(0,255,231,0.3);
      animation: micPulse 1.2s infinite;
    }

    @keyframes micPulse {
      0%, 100% { box-shadow: 0 0 10px rgba(0,255,231,0.3); }
      50%       { box-shadow: 0 0 28px rgba(0,255,231,0.6); }
    }

    /* ─── VOLUMEN BAR ────────────────────────────────── */
    #vol-bar-wrap {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 4px;
    }

    #vol-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s;
      box-shadow: 0 0 6px var(--accent);
    }

    /* ─── TILT INDICATOR ─────────────────────────────── */
    #tilt-indicator {
      width: 100%;
      max-width: 700px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      position: relative;
      overflow: visible;
    }

    #tilt-cursor {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 8px var(--accent2);
      transition: left 0.15s;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>VOICEPLAYER</h1>
    <div id="mic-status">
      <div id="mic-dot"></div>
      <span id="mic-label">ESPERANDO</span>
    </div>
  </header>

  <!-- VIDEO -->
  <div id="video-wrapper">
    <video id="video" src="https://www.w3schools.com/html/mov_bbb.mp4" playsinline></video>
    <div id="flash">
      <div id="flash-icon"></div>
    </div>
  </div>

  <!-- BARRA DE ESTADO -->
  <div id="status-bar">
    <div class="stat">
      <span class="stat-label">ESTADO</span>
      <span class="stat-value" id="stat-estado">PAUSADO</span>
    </div>
    <div class="stat">
      <span class="stat-label">VOLUMEN</span>
      <span class="stat-value" id="stat-vol">100%</span>
      <div id="vol-bar-wrap"><div id="vol-bar" style="width:100%"></div></div>
    </div>
    <div class="stat">
      <span class="stat-label">TIEMPO</span>
      <span class="stat-value" id="stat-tiempo">0:00</span>
    </div>
  </div>

  <!-- INCLINACIÓN -->
  <div id="tilt-indicator">
    <div id="tilt-cursor"></div>
  </div>

  <!-- LOG -->
  <div id="log-panel">
    <div id="log-title">// REGISTRO DE COMANDOS</div>
    <ul id="log-list"></ul>
  </div>

  <!-- GUÍA -->
  <div id="guide">
    <div id="guide-title">// COMANDOS DISPONIBLES</div>
    <div class="guide-grid">
      <div class="guide-item"><span class="guide-key">REPRODUCIR</span><span class="guide-desc">Inicia el video</span></div>
      <div class="guide-item"><span class="guide-key">PAUSAR</span><span class="guide-desc">Pausa el video</span></div>
      <div class="guide-item"><span class="guide-key">SUBIR</span><span class="guide-desc">Sube el volumen</span></div>
      <div class="guide-item"><span class="guide-key">BAJAR</span><span class="guide-desc">Baja el volumen</span></div>
      <div class="guide-item tilt"><span class="guide-key">↰ IZQUIERDA</span><span class="guide-desc">Retrocede 2s</span></div>
      <div class="guide-item tilt"><span class="guide-key">↱ DERECHA</span><span class="guide-desc">Adelanta 2s</span></div>
    </div>
  </div>

  <!-- BOTÓN MIC -->
  <button id="btn-mic" title="Activar micrófono">🎙️</button>

  <!-- Eruda para debug en móvil -->
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>

  <script src="app.js"></script>
</body>
</html>
